<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Título da página -->
    <title>SoulPass | Mobilidade Urbana Sustentável</title>
    <!-- Arquivos principais -->
    <link rel="stylesheet" href="css/main.css" />
    <script type="module" src="js/main.js" defer></script>
  </head>

  <body data-page="home">
    <!-- Botão do menu mobile e tablet-->
    <button class="toggle-sidebar">
      <img src="imagens/menu-burger.png" alt="Abrir menu" />
    </button>
    <!-- Menu lateral -->
    <aside class="barra_lateral" data-page="menu">
      <div class="barra-lateral-logo">
        <a href="index.html" class="logo">
          <img src="imagens/SoulUpLogo.png" alt="Logo da Empresa" />
        </a>
      </div>
      <!-- Navegação principal -->
      <nav class="barra-lateral-menu">
        <ul>
          <li>
            <a href="index.html">
              <img src="imagens/home.png" alt="Home" />
              <span class="menu-text" data-i18n="menu.home"></span>
            </a>
          </li>
          <li>
            <a href="paginas/quemsomos.html">
              <img src="imagens/users-alt.png" alt="Quem Somos" />
              <span class="menu-text" data-i18n="menu.quemSomos"></span>
            </a>
          </li>
          <li>
            <a href="paginas/sobre.html">
              <img src="imagens/circle-i.png" alt="Sobre" />
              <span class="menu-text" data-i18n="menu.sobre"></span>
            </a>
          </li>
          <li>
            <a href="paginas/faq.html">
              <img src="imagens/search.png" alt="FAQ" />
              <span class="menu-text" data-i18n="menu.faq"></span>
            </a>
          </li>
          <li>
            <a href="paginas/contato.html">
              <img src="imagens/phone-flip.png" alt="Contato" />
              <span class="menu-text" data-i18n="menu.contato"></span>
            </a>
          </li>
        </ul>
      </nav>

      <!-- Área inferior da sidebar -->
      <ul class="barra-lateral-rodape">
        <li>
          <a href="#">
            <img src="imagens/circle-user.png" alt="Perfil" />
            <span class="menu-text" data-i18n="menu.perfil"></span>
          </a>
        </li>
        <li>
          <button class="abrir-config">
            <img src="imagens/settings.png" alt="Configurações" />
            <span class="menu-text" data-i18n="menu.config"></span>
          </button>
        </li>
      </ul>
    </aside>

    <main>
      <!--Cabeçalho-->
      <header class="header" data-page="header">
        <button 
          class="btn btn-principal" 
          data-i18n="header.criarConta" 
          id="btn-criar-conta">
        </button>
        <button 
          class="btn btn-secundario" 
          data-i18n="header.entrar" 
          id="btn-entrar-conta">
      </button>
      </header>

      <!--Seção principal-->
      <section class="hero" data-page="hero">
        <div class="hero-text">
          <h1 data-i18n="hero.titulo"></h1>
          <p data-i18n="hero.paragrafo1"></p>
          <p data-i18n="hero.paragrafo2"></p>
          <p data-i18n="hero.paragrafo3"></p>

          <button
            class="btn btn-principal"
            id="btn-saiba-mais"
            data-i18n="hero.botao">
          </button>
        </div>

        <!--Imagem de fundo-->
        <div>
          <img
            src="imagens/mulhercelular-image.png"
            alt="Pessoa usando o celular"
          />
        </div>
      </section>
    </main>
    <!--Rodapé -->
    <footer class="footer" data-page="footer">
      <div class="footer-container">
        <!-- Sobre -->
        <div class="footer-section">
          <h3  data-i18n="footer.sobreTitulo"></h3>
          <p data-i18n="footer.sobreTexto"></p>
        </div>

        <!-- Links -->
        <div class="footer-section">
          <h3 data-i18n="footer.linksTitulo"></h3>
          <ul>
            <li><a href="index.html" data-i18n="footer.home"></a></li>
            <li><a href="paginas/sobre.html" data-i18n="footer.sobre"></a></li>
            <li><a href="paginas/faq.html" data-i18n="footer.faq"></a></li>
            <li><a href="paginas/contato.html" data-i18n="footer.contato"></a></li>
          </ul>
        </div>

        <!-- Contato -->
        <div class="footer-section">
          <h3 data-i18n="footer.contatoTitulo"></h3>
            <p data-i18n="footer.email"></p>
            <p data-i18n="footer.telefone"></p>
        </div>
      </div>

      <!-- LINHA FINAL -->
      <div class="footer-bottom">
        <p data-i18n="footer.direitos"></p>
      </div>
    </footer>

    <!-- Modal de Configurações -->
    <section class="modal" id="modal-config" data-page="config">
      <div class="modal-content">
        <button class="modal-close">&times;</button>

        <h2 data-i18n="config.titulo">Configurações</h2>

        <div class="config-item">
          <label data-i18n="config.linguagem">Linguagem</label>
          <select id="lang-select">
            <option value="pt">Português</option>
            <option value="en">English</option>
          </select>
        </div>
        
      </div>
    </section>
  </body>
</html>
