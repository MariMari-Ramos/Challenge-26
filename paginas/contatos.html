<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contato - SoulPass</title>
    <link rel="stylesheet" href="../css/main.css" />
    <link rel="stylesheet" href="../css/paginas/contato.css" />
    <script type="module" src="../js/main.js" defer></script>
  </head>
  <body data-page="contato">
    <!-- Barra lateral -->
    <aside class="barra_lateral" data-page="menu">
      <div class="barra-lateral-logo">
        <a href="../index.html" class="logo">
          <img src="../imagens/SoulUpLogo.png" alt="Logo da Empresa" />
        </a>
      </div>
      <nav class="barra-lateral-menu">
        <ul>
          <li>
            <a href="../index.html">
              <img src="../imagens/home.png" alt="Home" />
              <span class="menu-text" data-i18n="menu.home"></span>
            </a>
          </li>
          <li>
            <a href="quemsomos.html">
              <img src="../imagens/users-alt.png" alt="Quem Somos" />
              <span class="menu-text" data-i18n="menu.quemSomos"></span>
            </a>
          </li>
          <li>
            <a href="sobre.html">
              <img src="../imagens/circle-i.png" alt="Sobre" />
              <span class="menu-text" data-i18n="menu.sobre"></span>
            </a>
          </li>
          <li>
            <a href="faq.html">
              <img src="../imagens/search.png" alt="FAQ" />
              <span class="menu-text" data-i18n="menu.faq"></span>
            </a>
          </li>
          <li>
            <a href="contato.html">
              <img src="../imagens/phone-flip.png" alt="Contato" />
              <span class="menu-text" data-i18n="menu.contato"></span>
            </a>
          </li>
        </ul>
      </nav>
      <ul class="barra-lateral-rodape">
        <li>
          <a href="#">
            <img src="../imagens/circle-user.png" alt="Perfil" />
            <span class="menu-text" data-i18n="menu.perfil"></span>
          </a>
        </li>
        <li>
          <button class="abrir-config">
            <img src="../imagens/settings.png" alt="Configurações" />
            <span class="menu-text" data-i18n="menu.config"></span>
          </button>
        </li>
      </ul>
    </aside>

    <main>
      <!-- Cabecalho -->
      <header class="header" data-page="header">
        <button class="btn btn-principal" data-i18n="header.criarConta"></button>
        <button class="btn btn-secundario" data-i18n="header.entrar"></button>
      </header>

      <!-- Formulario de contato -->
      <section class="contato">
        <h1 data-i18n="contato.titulo"></h1>
        <p class="contato-intro" data-i18n="contato.intro"></p>

        <form class="contato-form" id="form-contato" novalidate>
          <!-- Campo nome -->
          <div class="form-grupo">
            <label for="nome" data-i18n="contato.labelNome"></label>
            <input type="text" id="nome" name="nome" required minlength="3" maxlength="80" />
            <span class="form-erro" id="erro-nome"></span>
          </div>

          <!-- Campo email -->
          <div class="form-grupo">
            <label for="email" data-i18n="contato.labelEmail"></label>
            <input type="email" id="email" name="email" required minlength="10" maxlength="100" />
            <span class="form-erro" id="erro-email"></span>
          </div>

          <!-- Campo assunto -->
          <div class="form-grupo">
            <label for="assunto" data-i18n="contato.labelAssunto"></label>
            <input type="text" id="assunto" name="assunto" required minlength="3" maxlength="100" />
            <span class="form-erro" id="erro-assunto"></span>
          </div>
